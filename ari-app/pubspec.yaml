name: ari_agent
description: "ARI Avatar AI Agent - Desktop AI Assistant"
publish_to: "none"
version: 0.4.9+76

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.5.1
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^10.3.10
  provider: ^6.1.2
  system_tray: ^2.0.3
  uuid: ^3.0.6
  path: ^1.9.0

  ari_plugin:
    path: ../ari-framework/plugin
  web_socket_channel: ^3.0.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/pretendard/Pretendard-Thin.ttf
          weight: 100
        - asset: assets/fonts/pretendard/Pretendard-Light.ttf
          weight: 300
        - asset: assets/fonts/pretendard/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/pretendard/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/pretendard/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/pretendard/Pretendard-Bold.ttf
          weight: 700
